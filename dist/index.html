כל בסדר גמור. ראיתי אתמול סרט טוב. הוא היה מצוין, גם אתה צריך לראות אותו. מה אתה עושה הערב? ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l6",title:"שאלות ותשובות — איפוס קצב בין משפטים",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. שמור על קצב שווה — לא ממהר בשאלות ולא מאט בתשובות.",text:"שאלה ותשובה: משפטים קצרים, הפסקות טבעיות ביניהם, איפוס קצב אחרי כל יחידה. Baddeley ו-Longman (1978) גילו שלא רק ריבוי שעות ביום מזיק ללמידה — גם מסה בלתי-מופרעת בתוך שיעור יחיד פחות יעילה מתרגול עם הפסקות. ההפסקות הקצרות בין שאלה לתשובה בתרגיל הזה מדמות את הדפוס שנמצא יעיל: פרץ קצר של פעילות, רגע מנוחה, פרץ נוסף. זה לא רק עיצוב ריתמי — זה שיכפול המבנה שנוצרת בו למידה יעילה. שמור על קצב שווה: לא מאיץ בשאלות הקצרות ולא מאט בתשובות. האחידות היא המיומנות.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שם הילד? שמו יעל. כמה גדל? גדל מאוד. מה קרא? קרא ספר של ילדים. איפה גר? בבית גדול עם כל המשפחה. ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l7",title:"טקסט ארוך — עמידות",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. הקלד עד הסוף ללא הפסקה.",text:"עמידות לאורך זמן — שמירה על טכניקה נכונה כשהאצבעות מתעייפות. Weigelt-Marom ו-Weintraub (2015) לא בדקו את תלמידיהם בסוף ההכשרה. הם בדקו אותם שלושה חודשים לאחר מכן. מה שנמצא לאחר שלושה חודשים — לאחר שזיכרון 'החיבור' עם ההכשרה דעך — הוא מה שנשאר באמת. עמידות היא בדיוק המדד הזה: טכניקה שמחזיקה כשהאצבעות עייפות, כשהקשב נחלש, כשהתרגיל הופך לשגרה. מה שנשמר בתנאי עייפות הוא מה שמיוצב. הקלד עד הסוף ללא הפסקה — ושמור על טכניקה נכונה עד ההקשה האחרונה. מילות העוגן מופיעות לאורך כל הקטע.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ידידות אמיתית היא דבר יקר מאוד. ילד שיש לו ידיד טוב הוא עשיר גדול. ספרים ומורים טובים, גן יפה ובית חם — אלה הם הדברים החשובים. הוא ידע כי כל ילד של הארץ הזאת יש לו עוד הרבה ללמוד ועוד הרבה לתת. ידע ועד ישע יעל על עם"},ayin_check:!0},{lesson_id:"s6_l8",title:"אתגר הסיכום הסופי — דיוק, קצב, עמידות",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. הטקסט הארוך ביותר במסלול. ברכות על הסיום.",text:"הטקסט הארוך ביותר במסלול — כל האותיות, כל הפיסוק, ומילות העוגן לכל אורכו. אם הגעת לכאן: יש לך הקלדה עיוורת. המטרה לא הייתה להפוך לרץ מהיר — אלא לשחרר את המוח מהמכניקה כדי שיוכל לחשוב. לפי מחקר Gahshan ו-Weintraub (2025), הקלדה עיוורת משפרת לא רק את המהירות אלא גם את איכות הכתיבה — כמות המילים, מגוון המשפטים, עושר התוכן. המנגנון: כשהאצבעות עובדות לבד, המוח יכול לחשוב על מה לכתוב. עכשיו הידיים יודעות — המוח יכול לכתוב.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ילד קטן ישב בבית ספר גדול. הוא קרא ספרים, למד מילים, וידע הרבה. של כל ילד יש חלום — ועם עבודה קשה הוא יכול לגדל אותו. המורה אמרה לו: כי כל ילד שלומד ומתאמץ יגדל חכם ובעל ידע. הוא ידע כי זה נכון, וחזר ולמד כל יום. גם כשהיה קשה, גם כשלא היה לו כוח — הוא ידע כי עוד קצת, ויש. ידע ועד ישע יעל על עם"},ayin_check:!0}]}];function ci(e){return e.exercise_zones?["zone_a","zone_b","zone_c"].filter(s=>e.exercise_zones[s]!==null):["zone_c"]}function ui(e,t){return e.exercise_zones?.[t]??""}function Ba(e){return{zone_a:"הכרה",zone_b:"מילים",zone_c:"ערבוב"}[e]}const Js="ע";function ja(e){const t=H(""),s=H(100),n=H(0),i=H(0),o=H(null),l=H(""),a=H(""),u=H(""),h=H(!1),f=H({}),g=H({}),x=H(e),z=H(null),R=H([]),E=H(0),J=G(()=>ci(x.value)),j=G(()=>J.value[E.value]??"zone_c"),N=G(()=>E.value>=J.value.length-1),B=G(()=>x.value.exercise_mode??"copy"),M=H(!1),Z=H(!1),de=1200*1e3;function X(){const A=new Date;return`sessionTime_${A.getFullYear()}-${String(A.getMonth()+1).padStart(2,"0")}-${String(A.getDate()).padStart(2,"0")}`}function ue(){return parseInt(localStorage.getItem(X())??"0",10)||0}function ke(A){localStorage.setItem(X(),String(A))}const ie=H(ue()),ze=H(ie.value>=1080*1e3),ye=H(ie.value>=de);let pe=null;function Ce(){ye.value||pe||(pe=setInterval(()=>{ie.value+=1e3,ke(ie.value),ie.value>=de?(ye.value=!0,ze.value=!1,he()):ie.value>=1080
