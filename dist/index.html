ק בהקלדה) היה מובהק. הסגנון השיחתי מיוחד: המילים שבו הן בדרך כלל המילים השכיחות ביותר — אלה שלפי Logan (1988) כבר עברו מחישוב לאחזור. שיחה היא הסגנון שבו האוטומציה מראה את עצמה ראשונה. כשמשפט שיחתי קצר זורם בלי מחשבה — זה לא בגלל שהוא קל: זה בגלל שהמוח כבר אוחר אותו כיחידה.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שלומך? כן, הכל בסדר גמור. למדתי אתמול גמרא טובה. היא היתה מצוינת, גם אתה צריך ללמוד אותה. מה אתה עושה הערב? אם יש זמן, בוא נלמד עם כל החברים. של זה אין ספק — זה יהיה כיף. לא עוד ישיבה בבית לבד, כי את התורה צריך ללמוד ביחד. אבל הם אמרו לו שכך עושים. על מה אתה חושב? ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l6",title:"שאלות ותשובות — איפוס קצב בין משפטים",phase_label:"אוטומציה",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. שמור על קצב שווה — לא ממהר בשאלות ולא מאט בתשובות. עיניים על המסך, לא על הידיים.",text:"שאלה ותשובה: משפטים קצרים, הפסקות טבעיות ביניהם, איפוס קצב אחרי כל יחידה. Baddeley ו-Longman (1978) גילו שלא רק ריבוי שעות ביום מזיק ללמידה — גם מסה בלתי-מופרעת בתוך שיעור יחיד פחות יעילה מתרגול עם הפסקות. ההפסקות הקצרות בין שאלה לתשובה בתרגיל הזה מדמות את הדפוס שנמצא יעיל: פרץ קצר של פעילות, רגע מנוחה, פרץ נוסף. זה לא רק עיצוב ריתמי — זה שיכפול המבנה שנוצרת בו למידה יעילה. שמור על קצב שווה: לא מאיץ בשאלות הקצרות ולא מאט בתשובות. האחידות היא המיומנות.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שם הרב? שמו יעל. כמה למד? למד מאוד. מה קרא? קרא גמרא של ראשונים. איפה גר? בבית גדול עם כל המשפחה. האם הוא ידע? כן, הוא ידע הרבה. מה היה קשה? לא זה — כי גם אם עוד היה קשה, יש לו עזרה מהרב. כך הם עוזרים. אבל על מה חשב? על ללמוד ולתת את הכל לשם שמים. ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l7",title:"טקסט ארוך — עמידות",phase_label:"אוטומציה",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. הקלד עד הסוף ללא הפסקה. עיניים על המסך, לא על הידיים.",text:"עמידות לאורך זמן — שמירה על טכניקה נכונה כשהאצבעות מתעייפות. Weigelt-Marom ו-Weintraub (2015) לא בדקו את תלמידיהם בסוף ההכשרה. הם בדקו אותם שלושה חודשים לאחר מכן. מה שנמצא לאחר שלושה חודשים — לאחר שזיכרון 'החיבור' עם ההכשרה דעך — הוא מה שנשאר באמת. עמידות היא בדיוק המדד הזה: טכניקה שמחזיקה כשהאצבעות עייפות, כשהקשב נחלש, כשהתרגיל הופך לשגרה. מה שנשמר בתנאי עייפות הוא מה שמיוצב. הקלד עד הסוף ללא הפסקה — ושמור על טכניקה נכונה עד ההקשה האחרונה. מילות העוגן מופיעות לאורך כל הקטע.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"חברותא אמיתית היא דבר יקר מאוד. תלמיד שיש לו חברותא טובה הוא עשיר גדול. לא זה בלבד — גם אם היה קשה, חברותא אמיתית נשארת. ספרים ורבנים טובים, בית מדרש חם ומשפחה תומכת — כן, אלה הם הדברים החשובים. הוא ידע כי כל בחור של הישיבה הזאת יש לו עוד הרבה ללמוד ועוד הרבה לתת. הוא ידע את זה, ועל כן גם נתן לשם שמים. כך עושים — אבל מה עוד? ידע ועד ישע יעל על עם"},ayin_check:!0},{lesson_id:"s6_l8",title:"אתגר הסיכום הסופי — דיוק, קצב, עמידות",phase_label:"אוטומציה",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. הטקסט הארוך ביותר במסלול. ברכות על הסיום. עיניים על המסך, לא על הידיים.",text:"הטקסט הארוך ביותר במסלול — כל האותיות, כל הפיסוק, ומילות העוגן לכל אורכו. אם הגעת לכאן: יש לך הקלדה עיוורת. המטרה לא הייתה להפוך לרץ מהיר — אלא לשחרר את המוח מהמכניקה כדי שיוכל לחשוב. לפי מחקר Gahshan ו-Weintraub (2025), הקלדה עיוורת משפרת לא רק את המהירות אלא גם את איכות הכתיבה — כמות המילים, מגוון המשפטים, עושר התוכן. המנגנון: כשהאצבעות עובדות לבד, המוח יכול לחשוב על מה לכתוב. עכשיו הידיים יודעות — המוח יכול לכתוב.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"בחור קטן ישב בבית מדרש גדול. הוא למד תורה, חזר על הגמרא, וידע הרבה. של כל תלמיד יש חלום — ועם עבודה קשה הוא יכול לגדל אותו לשם שמים. הרב אמר לו: כי כל בחור שלומד ומתאמץ יגדל חכם ובעל ידע. הוא ידע כי זה נכון, וחזר ולמד כל יום. גם כשהיה קשה, גם כשלא היה לו כוח — הוא ידע כי עוד קצת, ויש. כך הם עושים, אבל מה עוד אפשר? אם רצית את זה — כן, הגעת. ידע ועד ישע יעל על עם"},ayin_check:!0}]}];var po={};(function e(t,n,s,o){var l=!!(t.Worker&&t.Blob&&t.Promise&&t.OffscreenCanvas
