 לא לאט, לא ממהר. עיניים על המסך, לא על הידיים.",text:"20 המילים האלה מהוות כ-50% מכל טקסט עברי — מחדשות, ויקיפדיה וספרות. המקור: מאגר של 5 מיליון מילים (TeachMeHebrew). הקלד אותן שוב ושוב עד שהן זורמות. לפי Logan (1988), אוטומציה מתרחשת כשהמוח עובר מחישוב לאחזור: במקום לפרק 'ש-ל' לשתי תנועות, 'של' נאחרת כיחידה מוטורית שלמה. המעבר הזה לא קורה בהחלטה — הוא קורה מספרי חזרות. כל פעם שתקליד 'של' עכשיו, אתה מפקיד עוד מופע. לא ידוע בדיוק כמה נדרש — כנראה מאות — אבל ברגע שמספר המופעים מספיק גדול, האחזור מחליף את החישוב. לא תרגיש את הרגע שזה קורה. פשוט יום אחד 'של' תהיה שם, בלי מחשבה.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"של על עם כי את לא זה הוא גם אם כל עוד יש היה כן כך מה לו הם אבל"},ayin_check:!0},{lesson_id:"s6_l2",title:"צירופים שכיחים — מילים שנעות יחד",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. עיניים על המסך, לא על הידיים.",text:"מוח מיומן מקליד ביחידות של מילים — ולעיתים ביחידות של צירופים שלמים. של ה, לא ה, כי ה, גם כן — אלה צירופים שהאצבעות של מקלידנים מנוסים מקלידות כיחידה. Dhakal et al. (2018) ניתחו 136 מיליון הקשות ומצאו שהמרווח בין הקשות אצל מקלידנים מהירים קצר במיוחד עבור ביגרמים בעלי שכיחות גבוהה — זוגות אותיות שהמוח פגש אלפי פעמים. הצירופים בתרגיל זה הם בדיוק אותם ביגרמים: ש-ל, ע-ל, כ-י. עם מספיק חזרות, המרווח בין האותיות בצירוף יתחיל להתכווץ — לא בגלל שאתה 'מנסה' לקצר, אלא כי האחזור המוטורי של הצירוף שלם הוא מהיר יותר מהחישוב תו-אחר-תו. הקלד עד שהצירופים מרגישים כמו לחיצה אחת.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"של ה לא ה כי ה גם כן יש לו עם זה כל כך הוא את כי לא של על עם כי את גם לא הוא של ה אם היה עוד מה הם אבל ידע ועד ישע יעל"},ayin_check:!0},{lesson_id:"s6_l3",title:"מהירות מבוקרת — 80% ממקסימום, 95% דיוק",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. אם הדיוק נופל מ-95% — האט. עיניים על המסך, לא על הידיים.",text:"כלל: הקלד מהר מהרגיל שלך — אבל עצור אם הדיוק נופל מתחת ל-95%. לפני שמנסים: Dhakal et al. (2018) ניתחו 136 מיליון הקשות ממשתמשים רבים ומצאו שהכשרה רשמית בהקלדה מוסיפה בממוצע חמש מילים לדקה בלבד. חמש מילים. זה לא הסיפור של ההכשרה הזאת — וזה לא הסיפור של שלב 6. המטרה אינה להוסיף חמש מילים לדקה. המטרה היא חופש קוגניטיבי: כשהאצבעות פועלות ללא פיקוח, המוח מתפנה מהמכניקה ועוסק בתוכן. כלל ה-95% אינו כלל של פרפקציוניזם — הוא הגנה על ניקיון המערכת המוטורית. שגיאה לא מתוקנת היא מופע של תנועה שגויה. עם מספיק מופעים שגויים, הם מתחרים עם הנכונים.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"תלמיד גדל בבית של תורה כי ידע הרבה. הוא למד גמרא ולמד עם כל חבר. לא היה זה קל, גם אם עוד יש הרבה. כך הם עושים — אבל מה לו לעשות אם לא כן? על כן את כל ספר של תורה כדאי ללמוד. ידע ועד ישע יעל"},ayin_check:!0},{lesson_id:"s6_l4",title:"פסקה ראשונה — סגנון רשמי",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. עיניים על המסך, לא על הידיים.",text:"טקסט רשמי — משפטים ארוכים, מילים פחות שכיחות, צורות לשון פורמליות. עברית רשמית מכילה מילים ארוכות יותר ואותיות נדירות יותר מסגנון שיחתי — וזה נטל כבד יותר על המערכת המוטורית. הבחינה הקשה ביותר לדיוק בשלב 6: מילים כמו 'ישיבה', 'מצוות', 'ישקיע' מכילות אותיות שהאצבעות לא פגשו בתדירות גבוהה. שים לב שמילות העוגן (של, על, כי, לא, הוא, גם) מופיעות באופן טבעי — ומסומנות לא בכוח. בשלב הזה הן צריכות לצאת מהאצבעות בלי מחשבה.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ראש הישיבה הודיע כי הוא ישקיע בלימוד התורה. תלמידים בכל הארץ יקבלו ספרים חדשים ורבנים מיומנים. הוא אמר כי כל בחור של הישיבה יש לו זכות ללמוד. לא זה בלבד — גם אברכים עם ותק יקבלו עוד תמיכה. על כן, אם היה ספק, כן — ההשקעה בתורה באה. כך הם פועלים, אבל מה יהיה התוצאה? את הצעד הזה רבים ציפו לו. ידע ועד ישע יעל"},ayin_check:!0},{lesson_id:"s6_l5",title:"פסקה שנייה — סגנון שיחתי",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. עיניים על המסך, לא על הידיים.",text:"שיחות, הודעות ומכתבים — מילים קצרות, תדירות גבוהה, מבנה ישיר. Gahshan ו-Weintraub (2025) השתמשו בדיוק בסגנון הזה בתוכנית WoTIP: הם ביקשו מתלמידים לכתוב טקסטים שיחתיים ומצאו שהשיפור בכתיבה (לא רק בהקלדה) היה מובהק. הסגנון השיחתי מיוחד: המילים שבו הן בדרך כלל המילים השכיחות ביותר — אלה שלפי Logan (1988) כבר עברו מחישוב לאחזור. שיחה היא הסגנון שבו האוטומציה מראה את עצמה ראשונה. כשמשפט שיחתי קצר זורם בלי מחשבה — זה לא בגלל שהוא קל: זה בגלל שהמוח כבר אוחר אותו כיחידה.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שלומך? כן, הכל בסדר גמור. למדתי אתמול גמרא טובה. היא היתה מצוינת, גם אתה צריך ללמוד אותה. מה אתה עושה הערב? אם יש זמן, בוא נלמד עם כל החברים. של זה אין ספק — זה יהיה כיף. לא עוד ישיבה בבית לבד, כי את התורה צריך ללמוד ביחד. אבל הם אמרו לו שכך עושים. על מה אתה חושב? ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l6",title:"שאלות ותשובות — איפוס קצב בין משפטים",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. שמור על קצב שווה — לא ממהר בשאלות ולא מאט בתשובות. עיניים על המסך, לא על הידיים.",text:"שאלה ותשובה: משפטים קצרים, הפסקות טבעיות ביניהם, איפוס קצב אחרי כל יחידה. Baddeley ו-Longman (1978) גילו שלא רק ריבוי שעות ביום מזיק ללמידה — גם מסה בלתי-מופרעת בתוך שיעור יחיד פחות יעילה מתרגול עם הפסקות. ההפסקות הקצרות בין שאלה לתשובה בתרגיל הזה מדמות את הדפוס שנמצא יעיל: פרץ קצר של פעילות, רגע מנוחה, פרץ נוסף. זה לא רק עיצוב ריתמי — זה שיכפול המבנה שנוצרת בו למידה יעילה. שמור על קצב שווה: לא מאיץ בשאלות הקצרות ולא מאט בתשובות. האחידות היא המיומנות.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שם הרב? שמו יעל. כמה למד? למד מאוד. מה קרא? קרא גמרא של ראשונים. איפה גר? בבית גדול עם כל המשפחה. האם הוא ידע? כן, הוא ידע הרבה. מה היה קשה? לא זה — כי גם אם עוד היה קשה, יש לו עזרה מהרב. כך הם עוזרים. אבל על מה חשב? על ללמוד ולתת את הכל לשם שמים. ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l7",title:"טקסט ארוך — עמידות",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. הקלד עד הסוף ללא הפסקה. עיניים על המסך, לא על הידיים.",text:"עמידות לאורך זמן — שמירה על טכניקה נכונה כשהאצבעות מתעייפות. Weigelt-Marom ו-Weintraub (2015) לא בדקו את תלמידיהם בסוף ההכשרה. הם בדקו אותם שלושה חודשים לאחר מכן. מה שנמצא לאחר שלושה חודשים — לאחר שזיכרון 'החיבור' עם ההכשרה דעך — הוא מה שנשאר באמת. עמידות היא בדיוק המדד הזה: טכניקה שמחזיקה כשהאצבעות עייפות, כשהקשב נחלש, כשהתרגיל הופך לשגרה. מה שנשמר בתנאי עייפות הוא מה שמיוצב. הקלד עד הסוף ללא הפסקה — ושמור על טכניקה נכונה עד ההקשה האחרונה. מילות העוגן מופיעות לאורך כל הקטע.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"חברותא אמיתית היא דבר יקר מאוד. תלמיד שיש לו חברותא טובה הוא עשיר גדול. לא זה בלבד — גם אם היה קשה, חברותא אמיתית נשארת. ספרים ורבנים טובים, בית מדרש חם ומשפחה תומכת — כן, אלה הם הדברים החשובים. הוא ידע כי כל בחור של הישיבה הזאת יש לו עוד הרבה ללמוד ועוד הרבה לתת. הוא ידע את זה, ועל כן גם נתן לשם שמים. כך עושים — אבל מה עוד? ידע ועד ישע יעל על עם"},ayin_check:!0},{lesson_id:"s6_l8",title:"אתגר הסיכום הסופי — דיוק, קצב, עמידות",phase_label:"אוטומטי",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. הטקסט הארוך ביותר במסלול. ברכות על הסיום. עיניים על המסך, לא על הידיים.",text:"הטקסט הארוך ביותר במסלול — כל האותיות, כל הפיסוק, ומילות העוגן לכל אורכו. אם הגעת לכאן: יש לך הקלדה עיוורת. המטרה לא הייתה להפוך לרץ מהיר — אלא לשחרר את המוח מהמכניקה כדי שיוכל לחשוב. לפי מחקר Gahshan ו-Weintraub (2025), הקלדה עיוורת משפרת לא רק את המהירות אלא גם את איכות הכתיבה — כמות המילים, מגוון המשפטים, עושר התוכן. המנגנון: כשהאצבעות עובדות לבד, המוח יכול לחשוב על מה לכתוב. עכשיו הידיים יודעות — המוח יכול לכתוב.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"בחור קטן ישב בבית מדרש גדול. הוא למד תורה, חזר על הגמרא, וידע הרבה. של כל תלמיד יש חלום — ועם עבודה קשה הוא יכול לגדל אותו לשם שמים. הרב אמר לו: כי כל בחור שלומד ומתאמץ יגדל חכם ובעל ידע. הוא ידע כי זה נכון, וחזר ולמד כל יום. גם כשהיה קשה, גם כשלא היה לו כוח — הוא ידע כי עוד קצת, ויש. כך הם עושים, אבל מה עוד אפשר? אם רצית את זה
