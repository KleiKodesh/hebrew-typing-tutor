מיקום ברירת מחדל), ע (מורה שמאל — הגעה פנימית ימינה). יד ימין: ח (מורה — מיקום ברירת מחדל), י (מורה ימין — הגעה פנימית שמאלה), ל (אמה), ך (קמיצה), ף (זרת). שמונת השיעורים בשלב זה בונים את המיפוי הבסיסי בין אות לאצבע. שימו לב: י ו-ע הן שתי הגעות פנימיות — כל אחת מקבלת שיעור ייעודי משלה, כמו שמלמדים כל מיומנות מדויקת בנפרד.",phase_context:"זהו השלב הקוגניטיבי של רכישת ההקלדה. כל הקשה דורשת מחשבה מודעת — זה תקין לחלוטין ומצופה. לפי מחקר שנערך באוניברסיטה העברית עם 74 סטודנטים ישראלים, תוכנית שהתמקדה אך ורק בטכניקה — לא במהירות — הביאה לשיפור מדיד במהירות לאחר שלושה חודשים. אל תנסה להקליד מהר. דיוק עכשיו הוא ההשקעה במהירות מאוחר יותר. הציפייה האחת של כל שיעור: עיניים על המסך, לא על הידיים.",lessons:[{lesson_id:"s1_l1",title:"יד שמאל: ש, ד, ג, כ — הכרת ארבע האצבעות",phase_label:"קוגניטיבי",salthouse_target:"translation",exercise_mode:"copy",session_guidance:"עד 20 דקות. שיעור אחד ביום — לא יותר. אם אתה טועה באותה אצבע שלוש פעמים ברצף, עצור.",text:"הנח ארבע אצבעות שמאל על המקשים: זרת על ש, קמיצה על ד, אמה על ג, מורה על כ. מצא את הבליטה הקטנה על כ — היא נקודת העוגן שלך. לחץ כל מקש לאט, ושחרר מיד. המוח שלך מבצע כרגע תרגום בין אות לתנועת אצבע — זו עבודה קוגניטיבית כבדה, גם אם לא מרגישה ככה. עיניים על המסך.",exercise_zones:{zone_a:"שד דש שג גש שכ כש דג גד",zone_b:"גד שד כד דגש שכד גדש",zone_c:"כגד שדג דג גד שכ כש גש שג כד דכ שד דש גכ כג שדג כגד גד כד"},ayin_check:!1},{lesson_id:"s1_l2",title:"יד שמאל: צירופים ראשונים — המוח לומד דרך חזרה מגוונת",phase_label:"קוגניטיבי",salthouse_target:"translation",exercise_mode:"copy",session_guidance:"עד 20 דקות. שיעור אחד ביום. קרא כל צירוף לפני שאתה מקליד אותו.",text:"אותן ארבע אצבעות, צירופים שונים. Shea ו-Morgan (1979) גילו שמגוון — גם כשמדובר רק בארבע אותיות — בונה זיכרון ארוך-טווח טוב יותר מחזרה על אותו צירוף. קרא כל צירוף בשקט לפני שאתה מקליד אותו. עיניים על המסך.",exercise_zones:{zone_a:"שד דש גד כד שג גש",zone_b:"גד כד שד דגש שכד כגד",zone_c:"גד דג כד דכ שד גדש שכד כגד שדג גש כש שג דש שד גד כגד שד גכ"},ayin_check:!1},{lesson_id:"s . שגיאה לא מתוקנת היא מופע של תנועה שגויה. עם מספיק מופעים שגויים, הם מתחרים עם הנכונים.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ילד גדל בבית גדול כי ידע הרבה. הוא קרא ספרים ולמד עם כל ילד. של ה ישועה הגדולה באה לארצו היפה. ידע ועד"},ayin_check:!0},{lesson_id:"s6_l4",title:"פסקה ראשונה — סגנון עיתוני",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. עיניים על הטקסט — לא על הידיים.",text:"טקסט עיתוני — משפטים ארוכים, מילים פחות שכיחות, צורות לשון פורמליות. Khoury-Shaheen ו-Weintraub (2026) בחנו תלמידים ישראלים עם הפרעות תיאום ומצאו שההבדל בין תלמידים לפי סוג הטקסט הוא מובהק: טקסטים פורמליים, כגון כתיבה עיתונאית, מכילים מילים ארוכות יותר ואותיות נדירות יותר — וזה נטל כבד יותר על המערכת המוטורית. עברית עיתונאית היא הבחינה הקשה ביותר לדיוק בשלב 6: מילים כמו 'ממשלת', 'מיומנים', 'ישקיע' מכילות אותיות שהאצבעות לא פגשו בתדירות גבוהה. שים לב שמילות העוגן (של, על, כי, לא, הוא, גם) מופיעות באופן טבעי — ומסומנות לא בכוח. בשלב הזה הן צריכות לצאת מהאצבעות בלי מחשבה.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ממשלת ישראל הודיעה כי היא תשקיע בחינוך. ילדים בכל הארץ יקבלו ספרים חדשים ומורים מיומנים. הוא אמר כי כל ילד של הארץ יש לו זכות ללמוד. ידע ועד ישע יעל"},ayin_check:!0},{lesson_id:"s6_l5",title:"פסקה שנייה — סגנון שיחתי",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום.",text:"שיחות, צ'אטים והודעות — מילים קצרות, תדירות גבוהה, מבנה ישיר. Gahshan ו-Weintraub (2025) השתמשו בדיוק בסגנון הזה בתוכנית WoTIP: הם ביקשו מתלמידים לכתוב טקסטים שיחתיים ומצאו שהשיפור בכתיבה (לא רק בהקלדה) היה מובהק. הסגנון השיחתי מיוחד: המילים שבו הן בדרך כלל המילים השכיחות ביותר — אלה שלפי Logan (1988) כבר עברו מחישוב לאחזור. שיחה היא הסגנון שבו האוטומציה מראה את עצמה ראשונה. כשמשפט שיחתי קצר זורם בלי מחשבה — זה לא בגלל שהוא קל: זה בגלל שהמוח כבר אוחר אותו כיחידה. עיניים על הטקסט.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שלומך? כן, הכל בסדר גמור. ראיתי אתמול סרט טוב. הוא היה מצוין, גם אתה צריך לראות אותו. מה אתה עושה הערב? ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l6",title:"שאלות ותשובות — איפוס קצב בין משפטים",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. שמור על קצב שווה — לא ממהר בשאלות ולא מאט בתשובות.",text:"שאלה ותשובה: משפטים קצרים, הפסקות טבעיות ביניהם, איפוס קצב אחרי כל יחידה. Baddeley ו-Longman (1978) גילו שלא רק ריבוי שעות ביום מזיק ללמידה — גם מסה בלתי-מופרעת בתוך שיעור יחיד פחות יעילה מתרגול עם הפסקות. ההפסקות הקצרות בין שאלה לתשובה בתרגיל הזה מדמות את הדפוס שנמצא יעיל: פרץ קצר של פעילות, רגע מנוחה, פרץ נוסף. זה לא רק עיצוב ריתמי — זה שיכפול המבנה שנוצרת בו למידה יעילה. שמור על קצב שווה: לא מאיץ בשאלות הקצרות ולא מאט בתשובות. האחידות היא המיומנות.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"מה שם הילד? שמו יעל. כמה גדל? גדל מאוד. מה קרא? קרא ספר של ילדים. איפה גר? בבית גדול עם כל המשפחה. ידע ועד ישע"},ayin_check:!0},{lesson_id:"s6_l7",title:"טקסט ארוך — עמידות",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. שיעור אחד ביום. הקלד עד הסוף ללא הפסקה.",text:"עמידות לאורך זמן — שמירה על טכניקה נכונה כשהאצבעות מתעייפות. Weigelt-Marom ו-Weintraub (2015) לא בדקו את תלמידיהם בסוף ההכשרה. הם בדקו אותם שלושה חודשים לאחר מכן. מה שנמצא לאחר שלושה חודשים — לאחר שזיכרון 'החיבור' עם ההכשרה דעך — הוא מה שנשאר באמת. עמידות היא בדיוק המדד הזה: טכניקה שמחזיקה כשהאצבעות עייפות, כשהקשב נחלש, כשהתרגיל הופך לשגרה. מה שנשמר בתנאי עייפות הוא מה שמיוצב. הקלד עד הסוף ללא הפסקה — ושמור על טכניקה נכונה עד ההקשה האחרונה. מילות העוגן מופיעות לאורך כל הקטע.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ידידות אמיתית היא דבר יקר מאוד. ילד שיש לו ידיד טוב הוא עשיר גדול. ספרים ומורים טובים, גן יפה ובית חם — אלה הם הדברים החשובים. הוא ידע כי כל ילד של הארץ הזאת יש לו עוד הרבה ללמוד ועוד הרבה לתת. ידע ועד ישע יעל על עם"},ayin_check:!0},{lesson_id:"s6_l8",title:"אתגר הסיכום הסופי — דיוק, קצב, עמידות",phase_label:"automatic",salthouse_target:"automatization",exercise_mode:"free",session_guidance:"עד 20 דקות. הטקסט הארוך ביותר במסלול. ברכות על הסיום.",text:"הטקסט הארוך ביותר במסלול — כל האותיות, כל הפיסוק, ומילות העוגן לכל אורכו. אם הגעת לכאן: יש לך הקלדה עיוורת. המטרה לא הייתה להפוך לרץ מהיר — אלא לשחרר את המוח מהמכניקה כדי שיוכל לחשוב. לפי מחקר Gahshan ו-Weintraub (2025), הקלדה עיוורת משפרת לא רק את המהירות אלא גם את איכות הכתיבה — כמות המילים, מגוון המשפטים, עושר התוכן. המנגנון: כשהאצבעות עובדות לבד, המוח יכול לחשוב על מה לכתוב. עכשיו הידיים יודעות — המוח יכול לכתוב.",exercise_zones:{zone_a:null,zone_b:null,zone_c:"ילד קטן ישב בבית ספר גדול. הוא קרא ספרים, למד מילים, וידע הרבה. של כל ילד יש חלום — ועם עבודה קשה הוא יכול לגדל אותו. המורה אמרה לו: כי כל ילד שלומד ומתאמץ יגדל חכם ובעל ידע. הוא ידע כי זה נכון, וחזר ולמד כל יום. גם כשהיה קשה, גם כשלא היה לו כוח — הוא ידע כי עוד קצת, ויש. ידע ועד ישע יעל על עם"},ayin_check:!0}]}];var no={};(function e(t,n,s,o){var r=!!(t.Worker&&t.Blob&&t.Promise&&t.OffscreenCanvas&&t.OffscreenCanvasRenderingContext2D&&t.HTMLCanvasElement&&t.HTMLCanvasElement.prototype.transferControlToOffscreen&&t.URL&&t.URL.createObjectURL),i=typeof Path2D=="function"&&typeof DOMMatrix=="function",a=(function(){if(!t.OffscreenCanvas)return!1;var m=new OffscreenCanvas(1,1),h=m.getContext("2d");h.fillRect(0,0,1,1);var I=m.transferToImageBitmap();try{h.createPattern(I,"no-repeat")}catch{return!1}return!0})();function c(){}function p(m){var h=n.exports.Promise,I=h!==void 0?h:t.Promise;return typeof I=="function"?new I(m):(m(c,c),null)}var d=(function(m,h){return{transform:function(I){if(m)return I;if(h.has(I))return h.get(I);var B=new OffscreenCanvas(I.width,I.height),V=B.getContext("2d");return V.drawImage(I,0,0),h.set(I,B),B},clear:function(){h.clear()}}})(a,new Map),_=(function(){var m=Math.floor(16.666666666666668),h,I,B={},V=0;return typeof requestAnimationFrame=="function"&&typeof cancelAnimationFrame=="function"?(h=
